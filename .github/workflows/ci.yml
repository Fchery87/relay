name: CI
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions: { contents: read }
jobs:
  test:
    strategy: { matrix: { os: [ubuntu-latest, macos-latest, windows-latest] } }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run conformance:matrix
      - run: bun run daemon:build:native
      - run: bun run release:smoke

  # Protected job: exercises the real cross-tier recovery seam against a
  # real (isolated, throwaway) self-hosted Convex backend — not the
  # deterministic fakes the `test` job above uses. Manual trigger only
  # (workflow_dispatch); ordinary PR/push CI never depends on this, and the
  # `test` job's own copy of this test is not part of ordinary package tests;
  # this protected job opts in explicitly, and fails if its backend or
  # loopback prerequisites are unavailable rather than going green empty.
  cross-tier-recovery:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Install self-hosted Convex backend
        run: |
          mkdir -p "$HOME/.local/share/convex-selfhost"
          cd "$HOME/.local/share/convex-selfhost"
          curl -sLO https://github.com/get-convex/convex-backend/releases/latest/download/convex-local-backend-x86_64-unknown-linux-gnu.zip
          unzip -o convex-local-backend-x86_64-unknown-linux-gnu.zip
          chmod +x convex-local-backend
      - run: RELAY_CROSS_TIER=1 bun test apps/daemon/src/cross-tier-recovery.e2e.test.ts

  # Protected provider job: the real Codex app-server lifecycle is opt-in and
  # requires the repository's OPENAI_API_KEY secret. It is intentionally
  # separate from the isolated-backend job and never runs on PR/push CI.
  real-codex-harness:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Install pinned Codex app-server
        run: npm install --global @openai/codex@0.144.3
      - name: Regenerate and verify pinned Codex schemas
        run: |
          bun run codex:schema:generate
          bun run codex:schema:check
      - name: Run real Codex harness lifecycle
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RELAY_CODEX_ENABLED: "1"
          RELAY_E2E_CODEX: "1"
        run: bun run scripts/smoke-codex-harness.ts
