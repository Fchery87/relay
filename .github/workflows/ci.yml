name: CI
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
permissions: { contents: read }
jobs:
  test:
    strategy: { matrix: { os: [ubuntu-latest, macos-latest, windows-latest] } }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run conformance:matrix
        env:
          RELAY_CONFORMANCE_EVIDENCE_PATH: ${{ runner.temp }}/relay-conformance.json
      - run: bun run daemon:build:native
      - run: bun run release:smoke
      - name: Upload conformance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-${{ matrix.os }}
          path: ${{ runner.temp }}/relay-conformance.json
          if-no-files-found: error

  # Protected job: exercises the real cross-tier recovery seam against a
  # real (isolated, throwaway) self-hosted Convex backend — not the
  # deterministic fakes the `test` job above uses. Manual trigger only
  # (workflow_dispatch); ordinary PR/push CI never depends on this, and the
  # `test` job's own copy of this test is not part of ordinary package tests;
  # this protected job opts in explicitly, and fails if its backend or
  # loopback prerequisites are unavailable rather than going green empty.
  cross-tier-recovery:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Install self-hosted Convex backend
        run: |
          pin_manifest="$GITHUB_WORKSPACE/docs/operations/self-hosted-convex-pin.json"
          archive_sha256="$(node -e 'console.log(require(process.argv[1]).releaseArchiveSha256)' "$pin_manifest")"
          binary_sha256="$(node -e 'console.log(require(process.argv[1]).binarySha256)' "$pin_manifest")"
          mkdir -p "$HOME/.local/share/convex-selfhost"
          cd "$HOME/.local/share/convex-selfhost"
          curl -sSfL https://github.com/get-convex/convex-backend/releases/latest/download/convex-local-backend-x86_64-unknown-linux-gnu.zip -o backend.zip
          echo "$archive_sha256  backend.zip" | sha256sum --check --strict
          unzip -o backend.zip
          echo "$binary_sha256  convex-local-backend" | sha256sum --check --strict
          chmod +x convex-local-backend
      - name: Run protected cross-tier recovery
        run: |
          RELAY_CROSS_TIER=1 bun run scripts/run-protected-evidence.ts \
            --output "$RUNNER_TEMP/cross-tier-recovery.json" -- \
            bun test apps/daemon/src/cross-tier-recovery.e2e.test.ts
      - name: Upload cross-tier evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-tier-recovery-${{ github.run_id }}
          path: ${{ runner.temp }}/cross-tier-recovery.json
          if-no-files-found: error

  # Protected provider job: the real Codex app-server lifecycle is opt-in and
  # requires the repository's OPENAI_API_KEY secret. It is intentionally
  # separate from the isolated-backend job and never runs on PR/push CI.
  real-codex-harness:
    if: github.event_name == 'workflow_dispatch'
    strategy: { matrix: { os: [ubuntu-latest, macos-latest, windows-latest] } }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Install pinned Codex app-server
        run: npm install --global @openai/codex@0.144.3
      - name: Regenerate and verify pinned Codex schemas
        run: |
          bun run codex:schema:generate
          bun run codex:schema:check
      - name: Run real Codex harness lifecycle
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RELAY_CODEX_ENABLED: "1"
          RELAY_E2E_CODEX: "1"
        shell: bash
        run: |
          bun run scripts/run-protected-evidence.ts \
            --output "$RUNNER_TEMP/real-codex-harness.json" -- \
            bun run scripts/smoke-codex-harness.ts
      - name: Upload real Codex evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-codex-harness-${{ matrix.os }}-${{ github.run_id }}
          path: ${{ runner.temp }}/real-codex-harness.json
          if-no-files-found: error
